name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build & Release (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Build Rust workspace (release)
        run: cargo build --release --workspace

      - name: Prepare external binaries
        run: node scripts/prep-binaries.mjs

      - name: Build Tauri app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Collect installers
        id: artifacts
        shell: pwsh
        run: |
          $msi  = Get-ChildItem src-tauri/target/release/bundle/msi/*.msi  | Select-Object -First 1
          $nsis = Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe  | Select-Object -First 1
          echo "msi=$($msi.FullName)"   >> $env:GITHUB_OUTPUT
          echo "nsis=$($nsis.FullName)" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Sable ${{ github.ref_name }}"
          body: |
            ## Sable ${{ github.ref_name }}

            ### Download
            | Installer | Format | Notes |
            |-----------|--------|-------|
            | `Sable_x64-setup.exe` | NSIS | Recommended — standard Windows installer |
            | `Sable_x64_en-US.msi` | MSI | For enterprise / silent deployment |

            ### What's new
            See [CHANGELOG](https://github.com/joshsegatt/Sable-Overlay-Gamer/blob/main/CHANGELOG.md) for full release notes.

            ---
            **System requirements:** Windows 10/11 64-bit · DirectX 11+ · 4 GB RAM
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          files: |
            ${{ steps.artifacts.outputs.nsis }}
            ${{ steps.artifacts.outputs.msi }}
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
            src-tauri/target/release/bundle/msi/*.msi.zip.sig
